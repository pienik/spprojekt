<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopMaster Game</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel CDN (do transpilacji JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Dodatkowe style, jeśli potrzeba */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .grid {
      display: grid;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>
  
  <!-- Ładujemy komponent gry z pliku JSX -->
  <script type="text/babel" src="loop-learning-game.jsx"></script>
  
  <!-- Inicjalizacja React -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<LoopMasterGame />);
  </script>
</body>
</html>
